<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olá, Bruno!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .badge {
      display: inline-block;
      background: #e94560;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    h1 span {
      color: #e94560;
    }

    p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233, 69, 96, 0.4);
    }

    .footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Claude Code</span>
    <h1>Olá, <span>Bruno!</span></h1>
    <p>
      Este HTML foi criado pelo Claude Code para demonstrar capacidade de criação.
      Design limpo, responsivo e sem dependências externas.
    </p>
    <button class="btn" onclick="this.textContent = '✓ Funcionando!'">Testar</button>
    <div class="footer">Criado em 08/05/2026 &mdash; teste-git</div>
  </div>
</body>
</html>
